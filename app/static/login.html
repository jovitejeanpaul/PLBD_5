<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AQUA-SENS - Connexion</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#0F4C75,#3282B8,#BBE1FA);

}

.card{

    width:380px;

    background:white;

    border-radius:15px;

    padding:40px;

    box-shadow:0 10px 35px rgba(0,0,0,.25);

}

h1{

    color:#0F4C75;

    text-align:center;

    margin-bottom:10px;

}

.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:30px;

}

input{

    width:100%;

    padding:14px;

    margin-bottom:18px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:15px;

}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:8px;

    cursor:pointer;

    background:#0F4C75;

    color:white;

    font-size:16px;

    transition:.3s;

}

button:hover{

    background:#3282B8;

}

#error{

    color:red;

    margin-top:15px;

    text-align:center;

}

</style>

</head>

<body>

<div class="card">

<h1>AQUA-SENS</h1>

<div class="subtitle">

Interface sécurisée

</div>

<input
id="username"
placeholder="Nom d'utilisateur"
>

<input
id="password"
type="password"
placeholder="Mot de passe"
>

<button onclick="login()">

Se connecter

</button>

<div id="error"></div>

</div>

<script>

async function login(){

    const username=document.getElementById("username").value;

    const password=document.getElementById("password").value;

    const response=await fetch("/login",{

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            username,

            password

        })

    });

    if(response.ok){

        const data=await response.json();

        localStorage.setItem(

            "token",

            data.access_token

        );

        window.location="/";

    }

    else{

        document.getElementById("error").innerText=

        "Nom d'utilisateur ou mot de passe incorrect.";

    }

}

</script>

</body>

</html>
